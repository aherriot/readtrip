name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save Neon compute + CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast static checks: no DB, no browsers. Runs typecheck, lint, prettier,
  # design-system parity, and unit tests in parallel (via `npm run check` →
  # run-p), so a typo fails in seconds without waiting on a Neon branch. Runs
  # concurrently with the e2e and visual jobs below.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # typecheck + lint + format:check + check:design-system + test:unit,
      # aggregated so every failure is reported in one pass.
      - name: Static checks
        run: npm run check

  # End-to-end leg: needs a real Next.js server + Postgres, so it owns the Neon
  # branch and Playwright browsers. Kept separate from `static` so the fast
  # checks don't pay for DB/browser setup.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Spin up a throwaway Neon branch off production for this run only.
      - name: Create Neon test branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Apply migrations
        run: npm run db:migrate
        env:
          # drizzle-kit migrates over the direct (non-pooled) connection.
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test
        env:
          # The app uses the pooled connection at runtime.
          # (v6 renamed this output from db_url_with_pooler.)
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Always tear the branch down, even if tests failed.
      # Pinned to a main commit: the Node-24 fix isn't in a released tag yet
      # (latest v3.2.1 still runs setup-node on the deprecated Node 20). Switch
      # back to a version tag once Neon publishes one.
      - name: Delete Neon test branch
        if: always()
        uses: neondatabase/delete-branch-action@aed9ab1ec86e380312c7b0a9e29942e41349adf6 # main (Node 24)
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}

  # Visual regression for the design system. Runs the opt-in snapshot suite
  # against the component gallery. No DB needed: the gallery + landing routes
  # never import lib/db. Baselines are this runner's (Linux) PNGs; the first run
  # on a branch with no baseline seeds and commits one, after which it's a strict
  # gate. To intentionally accept a visual change, delete the baseline PNG in
  # your PR and CI will regenerate it (the new image shows up in the diff).
  visual:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to commit the seeded baseline back to the branch
    env:
      # The visual suite never touches the DB, but lib/db reads this at import;
      # a placeholder keeps any incidental import from throwing.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/placeholder"
    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the branch tip (not the PR merge ref) so a seeded baseline
          # can be committed back to it.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed Linux baseline on first run
        run: |
          if ls e2e/*-snapshots/*-linux.png >/dev/null 2>&1; then
            echo "Linux baseline present — comparing."
          else
            echo "No Linux baseline found — generating and committing one."
            npm run test:visual:update
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add e2e
            # --no-verify: skip the husky pre-commit hook (npm run check) — this
            # is a mechanical bot commit of a regenerated baseline, not source to
            # re-lint. No skip-ci marker needed: pushes made with GITHUB_TOKEN
            # don't trigger further workflow runs, so this can't loop.
            git commit --no-verify -m "test(design-system): seed Linux visual baseline"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Visual regression
        run: npm run test:visual

      - name: Upload visual diff on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff
          path: test-results/**
          retention-days: 7
